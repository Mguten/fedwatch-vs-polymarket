name: FedWatch live notify

# Modul 7: kor den LIVA notisfunktionen (run_notify.py). Datakalla for var
# sannolikhet ar investing.com (fedwatch.livesource.investing), inte
# ZQ-kontraktspipelinen som resten av repot visar upp -- se run_notify.py och
# RAPPORT.md for varfor. Kraver TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID som
# repo-secrets (Settings -> Secrets and variables -> Actions), se README.
#
# VIKTIGT (2026-07-16): investing.com svarar 403 Forbidden pa GitHub-hostade
# runners specifikt (Azure-datacenter-IP-intervall), aven om exakt samma
# anrop fungerar fint fran en vanlig hemma-/kontors-IP -- bekraftat genom att
# faktiskt kora denna workflow. Det ar sannolikt IP/datacenter-baserad
# bot-blockering fran investing.coms sida. Vi har medvetet INTE forsokt runda
# detta (proxy, IP-rotation etc.) -- det vore detection-evasion-teknik mot en
# tredje parts uttryckliga bot-skydd, samma linje som vi drog vid CME:s
# Akamai-block. Schemat (schedule:) ar darfor borttaget -- den HAR kort och
# gott inte fungerat automatiskt via GitHub Actions med nuvarande datakalla.
# Den faktiska notisfunktionen kors istallet lokalt via cron
# (run_notify_cron.sh, se README "Live-notiser"). Denna workflow lamnas kvar
# med workflow_dispatch for att dokumentera forsoket och kunna testas manuellt
# -- forvanta dig att den fortfarande misslyckas pa investing.com-steget om
# den kors fran GitHub-hostade runners.

"on":
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Återställ tidigare notis-state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: output/notify_state.json
          key: notify-state-${{ github.run_id }}
          restore-keys: |
            notify-state-

      - name: Kör notisfunktionen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_notify.py

      - name: Spara notis-state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/notify_state.json
          key: notify-state-${{ github.run_id }}
